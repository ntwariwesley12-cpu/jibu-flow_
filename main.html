<!DOCTYPE html>
<html lang="en">
<head>    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jibu Flow Water</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #chatContainer { max-width: 600px; margin: 0 auto; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 5px; }
        .user-message { background-color: #007bff; color: white; text-align: right; }
        .bot-message { background-color: #f1f1f1; color: black; }
        #inputContainer { display: flex; gap: 10px; }
        #messageInput { flex: 1; padding: 8px; }
        #sendButton { padding: 8px 16px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        #sendButton:hover { background-color: #218838; }
    </style>
</head>
