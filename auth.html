<!DOCTYPE html>
<html lang="en">
<head>    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jibu Flow Water</title>
    <link rel="stylesheet" href="professional.css">
    <style>
        :root {
            --bg-start: #edf1f6;
            --bg-end: #dbe4ef;
            --surface: #ffffff;
            --ink: #1f2937;
            --muted: #5b6678;
            --accent: #1f4e79;
            --accent-soft: #e8f0f8;
            --border: #cfd8e3;
            --success-bg: #e9f7ef;
            --success-ink: #1e6d3a;
            --error-bg: #fdecec;
            --error-ink: #8a1f2b;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            font-family: Arial, sans-serif;
            color: var(--ink);
        }
        .auth-wrap {
            width: min(95%, 440px);
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 16px 32px rgba(15, 23, 42, 0.12);
            padding: 22px;
        }
        .auth-brand {
            text-align: center;
            margin-bottom: 16px;
        }
        .auth-brand h1 {
            margin: 0 0 6px;
            color: var(--accent);
            font-size: 24px;
        }
        .auth-brand p {
            margin: 0;
            color: var(--muted);
        }
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .tab-btn {
            border: 1px solid var(--border);
            background: #f8fafc;
            color: var(--accent);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .auth-form label {
            display: block;
            margin: 10px 0 6px;
            font-size: 16px;
            font-weight: 600;
        }
        .auth-form input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            color: var(--ink);
            background: #fff;
        }
        .auth-form input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .field-hint {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
        }
        .password-wrap {
            position: relative;
        }
        .password-wrap input {
            padding-right: 42px;
        }
        .toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
        }
        .toggle-password:hover {
            background: var(--accent-soft);
        }
        .auth-submit {
            width: 100%;
            margin-top: 14px;
            padding: 11px;
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.2s ease;
        }
        .auth-submit:hover {
            filter: brightness(1.05);
        }
        .auth-message {
            margin-top: 12px;
            font-size: 14px;
            border-radius: 8px;
            padding: 10px;
            display: none;
        }
        .auth-message.error {
            display: block;
            background: var(--error-bg);
            color: var(--error-ink);
        }
        .auth-message.success {
            display: block;
            background: var(--success-bg);
            color: var(--success-ink);
        }
    </style>
</head>
<body>
    <main class="auth-wrap">
        <div class="auth-brand">
            <h1>Jibu Flow Water</h1>
            <p>Login or create your account and website profile</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="loginTab" type="button">Login</button>
            <button class="tab-btn" id="registerTab" type="button">Register</button>
        </div>

        <form id="loginForm" class="auth-form active">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" name="email" type="email" required>

            <label for="loginPassword">Password</label>
            <div class="password-wrap">
                <input id="loginPassword" name="password" type="password" required>
                <button class="toggle-password" type="button" data-toggle-target="loginPassword" aria-label="Show password">👁</button>
            </div>

            <button class="auth-submit" type="submit">Log In</button>
        </form>

        <form id="registerForm" class="auth-form">
            <label for="registerName">Full Name</label>
            <input id="registerName" name="name" type="text" required>

            <label for="registerEmail">Email</label>
            <input id="registerEmail" name="email" type="email" required>

            <label for="registerWebsiteName">Website Name</label>
            <input id="registerWebsiteName" name="websiteName" type="text" required>

            <label for="registerWebsiteSlug">Website Link Name</label>
            <input id="registerWebsiteSlug" name="websiteSlug" type="text" pattern="[a-z0-9-]{3,40}" maxlength="40" required>
            <small class="field-hint">Use letters, numbers, and hyphens only. Example: my-water-shop</small>

            <label for="registerPassword">Password</label>
            <div class="password-wrap">
                <input id="registerPassword" name="password" type="password" minlength="6" required>
                <button class="toggle-password" type="button" data-toggle-target="registerPassword" aria-label="Show password">👁</button>
            </div>

            <label for="registerPasswordConfirm">Confirm Password</label>
            <div class="password-wrap">
                <input id="registerPasswordConfirm" name="confirmPassword" type="password" minlength="6" required>
                <button class="toggle-password" type="button" data-toggle-target="registerPasswordConfirm" aria-label="Show password">👁</button>
            </div>

            <button class="auth-submit" type="submit">Create Account</button>
        </form>

        <div id="authMessage" class="auth-message"></div>
    </main>

    <script src="auth.js"></script>
</body>
</html>
