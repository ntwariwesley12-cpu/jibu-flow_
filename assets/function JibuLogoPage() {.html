<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jibu Flow Water Logo</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f6f8fb; color: #0f172a; }
        main { min-height: 100vh; display: grid; place-items: center; background: #f6f8fb; margin: 0; font-family: Arial, sans-serif; }
        .logo-card { text-align: center; padding: 24px 32px; background: #ffffff; border-radius: 16px; box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12); }
        .logo-title { font-size: 2rem; font-weight: 700; margin-bottom: 6px; }
        .logo-sub { color: #475569; margin: 0; }
    </style>
</head>
<body>
    <main>
        <div class="logo-card">
            <div class="logo-title">💧 Jibu Flow Water</div>
            <p class="logo-sub">Logo page</p>
        </div>
    </main>
</body>
</html>
