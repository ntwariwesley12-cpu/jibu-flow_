<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Notifications</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Order Notification System</h1>
        <form id="orderForm">
            <label for="phoneNumber">Your Phone Number:</label>
            <input type="text" id="phoneNumber" name="phoneNumber" required placeholder="+250 7xx xxx xxx">
            <label for="orderDetails">Order Details:</label>
            <textarea id="orderDetails" name="orderDetails" required placeholder="Enter your order details..."></textarea>
            <button type="submit">Place Order</button>
        </form>
        <div id="notification" class="notification"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
